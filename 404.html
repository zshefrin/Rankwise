<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found | Rankwise</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#0C1220;
  --paper-2:#111827;
  --ink:#F5F0E8;
  --ink-soft:rgba(245,240,232,.68);
  --accent:#F5B731;
  --accent-2:#2BA898;
  --display:'Syne',sans-serif;
  --text:'Plus Jakarta Sans','Helvetica Neue',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  font-family:var(--text);
  background:var(--paper);
  color:var(--ink);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  text-align:center;
  padding:40px 24px;
}
.code{
  font-family:var(--display);
  font-size:clamp(80px,20vw,160px);
  font-weight:800;
  line-height:1;
  color:var(--accent);
  letter-spacing:-.04em;
  margin-bottom:16px;
}
h1{
  font-family:var(--display);
  font-size:clamp(22px,4vw,32px);
  font-weight:700;
  margin-bottom:12px;
}
p{
  color:var(--ink-soft);
  font-size:16px;
  line-height:1.6;
  max-width:400px;
  margin-bottom:40px;
}
.links{display:flex;gap:16px;flex-wrap:wrap;justify-content:center}
.btn{
  display:inline-block;
  font-family:var(--display);
  font-size:13px;
  font-weight:700;
  letter-spacing:.02em;
  padding:12px 24px;
  border-radius:8px;
  text-decoration:none;
  transition:opacity .2s;
}
.btn:hover{opacity:.85}
.btn-primary{background:var(--accent);color:#0C1220}
.btn-secondary{background:rgba(245,240,232,.08);color:var(--ink)}
</style>
</head>
<body>
  <div class="code">404</div>
  <h1>Page not found</h1>
  <p>That URL doesn't exist. It may have moved or never existed.</p>
  <div class="links">
    <a href="/" class="btn btn-primary">Go home</a>
    <a href="/blog/" class="btn btn-secondary">Browse the blog</a>
  </div>
</body>
</html>
